name: Build and Release Extension

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.4.0, v1.5.0, etc.
  workflow_dispatch:  # Allow manual triggering

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build extension
      run: npm run build
      
    - name: Create extension package
      run: |
        mkdir -p dist
        cp -r CSS dist/
        cp -r HTML dist/
        mkdir -p dist/JS/bundle
        cp -r JS/bundle/* dist/JS/bundle/
        cp -r Resources dist/
        cp -r themes dist/
        cp changelog.txt dist/
        cp manifest.json dist/
        cp package.json dist/
        cp README.md dist/
        # Verify the file structure
        echo "Verifying file structure:"
        ls -la dist/
        ls -la dist/JS/
        ls -la dist/JS/bundle/
        
        cd dist
        zip -r ../goonopticon-extension.zip .
        cd ..
        ls -la goonopticon-extension.zip
        
    - name: Verify package creation
      run: |
        if [ ! -f "goonopticon-extension.zip" ]; then
          echo "Error: goonopticon-extension.zip was not created"
          exit 1
        fi
        echo "Package created successfully"
        
    - name: Extract version from package.json
      id: version
      run: |
        VERSION=$(node -p "require('./package.json').version")
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "tag=v$VERSION" >> $GITHUB_OUTPUT
        
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: Goonopticon ${{ steps.version.outputs.tag }}
        body: |
          ## Goonopticon ${{ steps.version.outputs.tag }}

          ### Changelog
          See [`changelog.txt`](https://github.com/CrudePixels/Goonopticon-Extension/blob/main/changelog.txt) in the repo for full release notes.

          ### Installation (Chrome / Edge / Brave)
          1. Download **goonopticon-extension.zip**
          2. Extract the zip
          3. Open `chrome://extensions` (or `edge://extensions`)
          4. Enable **Developer mode**
          5. **Load unpacked** → select the extracted folder

          ### Safari (macOS)
          Use **Add Temporary Extension…** or run `npm run safari:convert` — see `safari/README.md` in the repo.

          ### Package
          - **goonopticon-extension.zip** — unpacked extension (Load unpacked)
        files: goonopticon-extension.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
